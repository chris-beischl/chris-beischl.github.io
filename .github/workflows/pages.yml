# Deploy the static site (root: index.html + lectern/) to GitHub Pages.
# Works with Pages "Source: GitHub Actions" — no branch/folder setting needed.
name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "." # the repo root (index.html, lectern/, …)
      - id: deployment
        uses: actions/deploy-pages@v4
